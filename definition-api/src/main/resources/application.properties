
# Application Name
spring.application.name=definition-api

# Server Configuration
server.port=9996
server.servlet.context-path=/api/v1
server.compression.enabled=true
server.compression.min-response-size=1024

# Database Configuration
#spring.datasource.url=jdbc:postgresql://localhost:5432/test
#for docker
spring.datasource.url=jdbc:postgresql://postgres:5432/test
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=DefinitionApiHikariPool

# JPA Configuration
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Flyway Configuration (Disabled by default)
spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# jOOQ Configuration
spring.jooq.sql-dialect=POSTGRES

# Logging Configuration
logging.level.com.hussain.definition_api=DEBUG
logging.level.org.jooq=DEBUG
logging.level.org.springframework.jdbc=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Management/Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Schema Management Configuration
definition.schema.management.max-table-name-length=63
definition.schema.management.max-column-name-length=63
definition.schema.management.allowed-schemas=public,app
definition.schema.management.audit-enabled=true
definition.schema.management.default-schema=public
