# ==============================================
# Application Configuration
# ==============================================
spring.application.name=data-api

# ==============================================
# Server Configuration
# ==============================================
server.port=9995
#server.servlet.context-path=/api

# ==============================================
# Database Configuration
# ==============================================
#spring.datasource.url=jdbc:postgresql://localhost:5432/test
spring.datasource.url=jdbc:postgresql://postgres:5432/test
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# ==============================================
# Connection Pool
# ==============================================
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1

# ==============================================
# JPA Configuration
# ==============================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ==============================================
# Flyway Configuration
# ==============================================
spring.flyway.enabled=false
# spring.flyway.baseline-on-migrate=true
# spring.flyway.locations=classpath:db/migration

# ==============================================
# Logging Configuration
# ==============================================
logging.level.com.hussain.data_api=DEBUG
logging.level.org.jooq=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ==============================================
# Data API Custom Properties
# ==============================================
data.api.default-limit=100
data.api.max-limit=1000
data.api.enable-audit=true
data.api.enable-query-logging=true
data.api.enable-cache=false
data.api.cache-timeout=300

# ==============================================
# Actuator / Management Endpoints
# ==============================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.endpoint.metrics.enabled=true
management.endpoint.prometheus.enabled=true

# ==============================================
# Jackson Configuration
# ==============================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null

# ==============================================
# CORS Configuration (Optional)
